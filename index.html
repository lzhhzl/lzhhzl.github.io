<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1, minimum-scale=1.0, shrink-to-fit=no, viewport-fit=cover">

  <!-- Replace with your own title and description. -->
  <title>Root-None Blog</title>
  <meta name="description" content="Personal Blog.">

  <!-- Default Theme (see https://docsify.js.org/#/themes) -->
  <link rel="stylesheet" title="light" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" title="dark" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">

  <!-- insert custom css  -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-dark-switch/dist/docsify-dark-switch.css">

</head>

<body>
  <div id="app">Loading...</div>

  <script>
    // Docsify Configuration (see https://docsify.js.org/#/configuration)
    window.$docsify = {
      name: 'Contents',
      notFoundPage: true,

      // Sidebar Configuration
      auto2top: true,
      loadSidebar: true,
      autoHeader: true,
      maxLevel: 0,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      // Set subMaxLevel to 0 to remove automatic display of page table of contents (TOC) in Sidebar
      subMaxLevel: 0,

      // Navbar Configuration
      loadNavbar: true,
      mergeNavbar: true,

      // Search Plugin Configuration
      search: {
        placeholder: 'Type to search',
        noData: '找不到相关结果',
        // Headline depth, 1 - 6
        depth: 3,
      },

      // docs updated format
      timeUpdater: {
        text: "> Last Modify: {docsify-updated}</br>最后更新时间: {docsify-updated}",
        formatUpdated: "{YYYY}/{MM}/{DD}",
      }
    };
  </script>

  <!-- Required -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- Recommended -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-updated/src/time-updater.js"></script>
  <!-- Dark Mode Switch Plugin(github.com/markz-demo/docsify-dark-switch) -->>
  <script src="//cdn.jsdelivr.net/npm/docsify-dark-switch/dist/docsify-dark-switch.min.js"></script>

</body>
</html>
